<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Récréation — ta bibliothèque, à revoir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #2e3440; color: #eceff4; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(216,222,233,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(216,222,233,0.3); }
  input, textarea, button { font-family: inherit; }
  @keyframes rec-spin { to { transform: rotate(360deg); } }
  @keyframes rec-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rec-slide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="covers.js"></script>
<script type="text/babel" src="cards.jsx"></script>
<script type="text/babel" src="shells.jsx"></script>
<script type="text/babel" src="composer.jsx"></script>
<script type="text/babel" src="detail-stats.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="react">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "dark",
    "layout": "mur",
    "density": "compact"
  }/*EDITMODE-END*/;

  function Root() {
    const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const onToggleTheme = () => setTweak('theme', tw.theme === 'dark' ? 'light' : 'dark');

    return (
      <>
        <App tweaks={{ ...tw, onToggleTheme }} />
        <TweaksPanel title="Tweaks">
          <TweakSection label="Apparence" />
          <TweakRadio label="Thème" value={tw.theme}
            options={['dark', 'light']}
            onChange={(v) => setTweak('theme', v)} />
          <TweakRadio label="Densité" value={tw.density}
            options={['comfortable', 'compact']}
            onChange={(v) => setTweak('density', v)} />
          <TweakSection label="Mise en page" />
          <TweakRadio label="Affichage" value={tw.layout}
            options={['grille', 'liste', 'mur']}
            onChange={(v) => setTweak('layout', v)} />
          <TweakSection label="Images de couverture" />
          <TweakText label="Clé TMDB (films/séries)" value={tw.tmdbKey || ''}
            onChange={(v) => { setTweak('tmdbKey', v); localStorage.setItem('rec.key.tmdb', v); COVER_KEYS.tmdb = v; }} />
          <TweakText label="Clé RAWG (jeux)" value={tw.rawgKey || ''}
            onChange={(v) => { setTweak('rawgKey', v); localStorage.setItem('rec.key.rawg', v); COVER_KEYS.rawg = v; }} />
          <TweakButton label="Vider le cache images" onClick={() => { localStorage.removeItem('rec.covers.v1'); location.reload(); }} />
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
